<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tea Room - Fullscreen</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #e0e0e0;
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
      display: grid;
      grid-template-columns: 250px 1fr;
      min-height: 100vh;
      overflow-x: hidden; /* Prevents scrollbars if image shifts */
    }

    /* 1. Fullscreen Image Container */
    .image-container {
      position: fixed; /* Fixes it to the viewport */
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: -1; /* Puts it behind the sidebar and header */
      cursor: none;
    }

    .image-container img.bw, .color-overlay {
      width: 100%;
      height: 100%;
      object-fit: cover; /* Ensures the image fills the screen */
      display: block;
    }

    .color-overlay {
      position: absolute;
      top: 0;
      left: 0;
      background-image: url('tea_room_color.png');
      background-size: cover;
      background-position: center;
      clip-path: circle(0px at -9999px -9999px);
      pointer-events: none;
    }

    /* 2. Header & Sidebar (Keep these transparent/semi-transparent) */
    .top-header {
      grid-column: 2;
      padding: 20px 40px;
      pointer-events: none; /* Allows mouse to "pass through" to image logic */
    }
    .top-header h1, .top-header p { pointer-events: auto; } /* Re-enable for text selection */

    .sidebar {
      background:white;
      padding: 60px 30px;
      z-index: 2;
    }


  </style>
</head>
<body>

    <nav class="sidebar">
        <h3>Index</h3>
        <ul>
            <li><a href="#">→ The Cup of Humanity</a></li>
            <li><a href="#">→ Tea Masters</a></li>
            <li><a href="#">→ Flowers</a></li>
            <li><a href="#">→ Art Appreciation</a></li>
            <li><a href="#">→ The Schools of Tea</a></li>
            <li><a href="#">→ Teaism and Taoism</a></li>
            <li><a href="#">→ The Tea Room</a></li>
        </ul>
    </nav>

    <header class="top-header">
        <h1>THE BOOK OF TEA</h1>
        <p>Beauty, Simplicity and the Zen Aesthetic</p>
    </header>

    <div class="image-container" id="container">
        <img class="bw" src="tea_room_bw.png" alt="Tea room">
        <div class="color-overlay" id="colorOverlay"></div>
    </div>

    <div class="lens-ring" id="lensRing"></div>

    <script>
      const container = document.body; // Listen on body so it works everywhere
      const overlay   = document.getElementById('colorOverlay');
      const lensRing  = document.getElementById('lensRing');
      const RADIUS    = 80;

      container.addEventListener('mousemove', (e) => {
        // Since it's fullscreen, we just use clientX/Y directly
        const xPct = (e.clientX / window.innerWidth) * 100;
        const yPct = (e.clientY / window.innerHeight) * 100;

        overlay.style.clipPath = `circle(${RADIUS}px at ${xPct}% ${yPct}%)`;

        lensRing.style.left    = e.clientX + 'px';
        lensRing.style.top     = e.clientY + 'px';
        lensRing.style.display = 'block';
      });

      // Optional: hide lens if mouse leaves the window
      document.addEventListener('mouseleave', () => {
        lensRing.style.display = 'none';
        overlay.style.clipPath = 'circle(0px at -9999px -9999px)';
      });
    </script>
</body>
</html>
