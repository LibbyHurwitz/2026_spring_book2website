<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tea Room</title>
  <style>
    /* 1. Global Styles & Layout */
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #e0e0e0; /* Matches the light grey in the screenshot */
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
      color: #333;
      display: grid;
      /* Sidebar is 250px, the rest is for the content */
      grid-template-columns: 250px 1fr;
      grid-template-rows: auto 1fr;
      min-height: 100vh;
    }

    /* 2. Header Styles */
    .top-header {
      grid-column: 2; /* Sits to the right of the sidebar */
      padding: 60px 40px 20px 40px;
    }

    .top-header h1 {
      font-size: 1.2rem;
      letter-spacing: 0.3rem;
      font-weight: 300;
      margin-bottom: 5px;
      text-transform: uppercase;
    }

    .top-header p {
      font-size: 0.85rem;
      color: #666;
      font-style: italic;
    }

    /* 3. Sidebar Styles */
    .sidebar {
      grid-row: 1 / 3; /* Spans from top to bottom */
      background: #d6d6d6; /* Slightly darker grey for contrast */
      padding: 60px 30px;
      border-right: 1px solid #ccc;
    }

    .sidebar h3 {
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 0.1rem;
      margin-bottom: 30px;
      border-bottom: 1px solid #999;
      padding-bottom: 10px;
    }

    .sidebar ul {
      list-style: none;
    }

    .sidebar li {
      margin-bottom: 15px;
    }

    .sidebar a {
      text-decoration: none;
      color: #444;
      font-size: 0.85rem;
      transition: color 0.3s;
    }

    .sidebar a:hover {
      color: #000;
    }

    /* 4. Interactive Image Container */
    .main-content {
      grid-column: 2;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding-top: 20px;
    }

    .image-container {
      position: relative;
      display: inline-block;
      cursor: none;
      box-shadow: 0 20px 50px rgba(0,0,0,0.2);
    }

    .image-container img.bw {
      display: block;
      max-width: 900px;
      width: 100%;
      user-select: none;
      -webkit-user-drag: none;
    }

    .color-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: url('tea_room_color.png');
      background-size: 100% 100%;
      background-position: top left;
      clip-path: circle(0px at -9999px -9999px);
      pointer-events: none;
    }

    .lens-ring {
      position: fixed;
      width: 160px;
      height: 160px;
      border-radius: 50%;
      border: 2px solid rgba(255, 255, 255, 0.7);
      box-shadow: 0 0 0 1px rgba(0,0,0,0.25), inset 0 0 0 1px rgba(0,0,0,0.15), 0 6px 24px rgba(0,0,0,0.5);
      pointer-events: none;
      transform: translate(-50%, -50%);
      display: none;
      z-index: 10;
    }
  </style>
</head>
<body>

    <nav class="sidebar">
        <h3>Index</h3>
        <ul>
            <li><a href="#">→ The Cup of Humanity</a></li>
            <li><a href="#">→ Tea Masters</a></li>
            <li><a href="#">→ Flowers</a></li>
            <li><a href="#">→ Art Appreciation</a></li>
            <li><a href="#">→ The Schools of Tea</a></li>
            <li><a href="#">→ Teaism and Taoism</a></li>
            <li><a href="#">→ The Tea Room</a></li>
        </ul>
    </nav>

    <header class="top-header">
        <h1>THE BOOK OF TEA</h1>
        <p>Beauty, Simplicity and the Zen Aesthetic</p>
    </header>

    <main class="main-content">
        <div class="image-container" id="container">
            <img class="bw" src="tea_room_bw.png" alt="Tea room" id="bwImage">
            <div class="color-overlay" id="colorOverlay"></div>
        </div>
    </main>

    <div class="lens-ring" id="lensRing"></div>

    <script>
      const container = document.getElementById('container');
      const overlay   = document.getElementById('colorOverlay');
      const lensRing  = document.getElementById('lensRing');
      const RADIUS    = 80;

      container.addEventListener('mousemove', (e) => {
        const rect = container.getBoundingClientRect();
        const xPct = ((e.clientX - rect.left) / rect.width)  * 100;
        const yPct = ((e.clientY - rect.top)  / rect.height) * 100;

        overlay.style.clipPath = `circle(${RADIUS}px at ${xPct}% ${yPct}%)`;

        lensRing.style.left    = e.clientX + 'px';
        lensRing.style.top     = e.clientY + 'px';
        lensRing.style.display = 'block';
      });

      container.addEventListener('mouseleave', () => {
        overlay.style.clipPath  = 'circle(0px at -9999px -9999px)';
        lensRing.style.display  = 'none';
      });
    </script>

</body>
</html>
